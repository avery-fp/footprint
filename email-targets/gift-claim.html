<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <title>someone thought of you</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap');

    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; background-color: #0c0c10; }

    .email-body { background-color: #0c0c10; }
    .email-container { max-width: 600px; margin: 0 auto; }

    * { font-family: 'DM Mono', 'Courier New', monospace; }

    @media only screen and (max-width: 620px) {
      .email-container { width: 100% !important; margin: auto !important; }
      .fluid { max-width: 100% !important; height: auto !important; margin-left: auto !important; margin-right: auto !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0c0c10;">
  <center style="width: 100%; background-color: #0c0c10;">
    <!--[if mso]>
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" align="center"><tr><td>
    <![endif]-->

    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="max-width: 600px; margin: 0 auto;" class="email-container">

      <!-- Spacer -->
      <tr>
        <td style="padding: 72px 0 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
      </tr>

      <!-- Gift message -->
      <tr>
        <td style="padding: 0 32px; text-align: center;">
          <p style="margin: 0; font-family: 'DM Mono', 'Courier New', monospace; font-size: 13px; line-height: 1.6; font-weight: 300; color: #555560; letter-spacing: 0.04em; text-transform: lowercase;">
            someone thought of you
          </p>
        </td>
      </tr>

      <!-- Spacer -->
      <tr>
        <td style="padding: 40px 0 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
      </tr>

      <!-- Headline -->
      <tr>
        <td style="padding: 0 32px; text-align: center;">
          <p style="margin: 0; font-family: 'DM Mono', 'Courier New', monospace; font-size: 21px; line-height: 1.55; font-weight: 300; color: #d4c5a9; letter-spacing: 0.01em;">
            {{name}} gifted you<br>a Footprint.
          </p>
        </td>
      </tr>

      <!-- Spacer -->
      <tr>
        <td style="padding: 20px 0 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
      </tr>

      <!-- Body copy -->
      <tr>
        <td style="padding: 0 48px; text-align: center;">
          <p style="margin: 0; font-family: 'DM Mono', 'Courier New', monospace; font-size: 13px; line-height: 1.8; font-weight: 300; color: #777780; letter-spacing: 0.02em;">
            a single page for everything you are.<br>
            your links. your work. your world.<br>
            it's yours now.
          </p>
        </td>
      </tr>

      <!-- Spacer -->
      <tr>
        <td style="padding: 48px 0 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
      </tr>

      <!-- CTA Button -->
      <tr>
        <td style="padding: 0 32px; text-align: center;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
            <tr>
              <td style="border-radius: 3px; background-color: #d4c5a9;">
                <a href="https://footprint.onl/gift/{{code}}" target="_blank" style="display: inline-block; padding: 14px 36px; font-family: 'DM Mono', 'Courier New', monospace; font-size: 14px; font-weight: 500; color: #0c0c10; text-decoration: none; letter-spacing: 0.04em;">claim yours</a>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Spacer -->
      <tr>
        <td style="padding: 80px 0 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
      </tr>

      <!-- Divider -->
      <tr>
        <td style="padding: 0 32px;">
          <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
            <tr>
              <td style="border-top: 1px solid #1e1e24; font-size: 0; line-height: 0;">&nbsp;</td>
            </tr>
          </table>
        </td>
      </tr>

      <!-- Footer -->
      <tr>
        <td style="padding: 24px 32px 60px 32px; text-align: center;">
          <a href="https://footprint.onl" style="font-family: 'DM Mono', 'Courier New', monospace; font-size: 12px; color: #555560; text-decoration: none; letter-spacing: 0.06em;">footprint.onl</a>
        </td>
      </tr>

    </table>

    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </center>
</body>
</html>
